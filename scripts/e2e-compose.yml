services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: exchange
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${E2E_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exchange"]
      interval: 2s
      timeout: 3s
      retries: 30

  redpanda:
    image: ${REDPANDA_IMAGE:-redpandadata/redpanda:latest}
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:${E2E_REDPANDA_PORT:-19092}
    ports:
      - "${E2E_REDPANDA_PORT:-19092}:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30
