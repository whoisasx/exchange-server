services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: exchange
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${E2E_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exchange"]
      interval: 2s
      timeout: 3s
      retries: 30

  redpanda:
    image: ${REDPANDA_IMAGE:-redpandadata/redpanda:latest}
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:${E2E_REDPANDA_PORT:-19092}
    ports:
      - "${E2E_REDPANDA_PORT:-19092}:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30

  timescaledb:
    image: ${TIMESCALE_IMAGE:-timescale/timescaledb:latest-pg16}
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-exchange_timeseries}
      POSTGRES_USER: ${TIMESCALE_USER:-postgres}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-postgres}
    ports:
      - "${E2E_TIMESCALE_PORT:-55433}:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 3s
      retries: 30

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${E2E_MINIO_PORT:-59000}:9000"
      - "${E2E_MINIO_CONSOLE_PORT:-59001}:9001"
    volumes:
      - minio-data:/data

volumes:
  timescaledb-data:
  minio-data:
